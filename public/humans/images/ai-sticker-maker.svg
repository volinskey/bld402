<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Browser chrome -->
  <rect width="400" height="260" rx="8" fill="#f8f9fa" stroke="#e0e0e0"/>
  <rect width="400" height="28" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="48" cy="14" r="5" fill="#28c840"/>
  <!-- Header -->
  <rect y="28" width="400" height="30" fill="#fff"/>
  <text x="16" y="48" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">AI Sticker Maker</text>
  <!-- Prompt input -->
  <rect x="16" y="68" width="300" height="26" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="24" y="85" font-family="sans-serif" font-size="10" fill="#999">A happy cat wearing sunglasses...</text>
  <rect x="324" y="68" width="60" height="26" rx="4" fill="#7c3aed"/>
  <text x="342" y="85" font-family="sans-serif" font-size="9" fill="#fff">Generate</text>
  <!-- Sticker gallery grid -->
  <text x="16" y="112" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">Public Gallery</text>
  <rect x="16" y="120" width="84" height="84" rx="8" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="58" y="168" font-family="sans-serif" font-size="24" text-anchor="middle">&#128049;</text>
  <text x="58" y="196" font-family="sans-serif" font-size="7" fill="#888" text-anchor="middle">12 likes</text>
  <rect x="108" y="120" width="84" height="84" rx="8" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="150" y="168" font-family="sans-serif" font-size="24" text-anchor="middle">&#127800;</text>
  <text x="150" y="196" font-family="sans-serif" font-size="7" fill="#888" text-anchor="middle">8 likes</text>
  <rect x="200" y="120" width="84" height="84" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="242" y="168" font-family="sans-serif" font-size="24" text-anchor="middle">&#127758;</text>
  <text x="242" y="196" font-family="sans-serif" font-size="7" fill="#888" text-anchor="middle">5 likes</text>
  <rect x="292" y="120" width="84" height="84" rx="8" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="334" y="168" font-family="sans-serif" font-size="24" text-anchor="middle">&#128640;</text>
  <text x="334" y="196" font-family="sans-serif" font-size="7" fill="#888" text-anchor="middle">3 likes</text>
  <!-- Second row -->
  <rect x="16" y="212" width="84" height="40" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
  <rect x="108" y="212" width="84" height="40" rx="8" fill="#e0e7ef" stroke="#ccc"/>
  <rect x="200" y="212" width="84" height="40" rx="8" fill="#ffccbc" stroke="#ff8a65"/>
  <rect x="292" y="212" width="84" height="40" rx="8" fill="#e8eaf6" stroke="#9fa8da"/>
