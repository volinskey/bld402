<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Browser chrome -->
  <rect width="400" height="260" rx="8" fill="#f8f9fa" stroke="#e0e0e0"/>
  <rect width="400" height="28" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="48" cy="14" r="5" fill="#28c840"/>
  <!-- Header -->
  <rect y="28" width="400" height="30" fill="#fff"/>
  <text x="16" y="48" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Micro-Blog</text>
  <rect x="320" y="36" width="64" height="16" rx="3" fill="#0066cc"/>
  <text x="352" y="48" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">New Post</text>
  <!-- Compose box -->
  <rect x="16" y="68" width="368" height="36" rx="6" fill="#fff" stroke="#ccc"/>
  <text x="24" y="86" font-family="sans-serif" font-size="10" fill="#999">What's on your mind?</text>
  <rect x="330" y="76" width="44" height="18" rx="4" fill="#e0e7ef"/>
  <text x="340" y="89" font-family="sans-serif" font-size="8" fill="#555">Photo</text>
  <!-- Post 1 -->
  <rect x="16" y="114" width="368" height="56" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="34" cy="130" r="10" fill="#d0dbe5"/>
  <text x="50" y="132" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1a1a1a">Alice</text>
  <text x="86" y="132" font-family="sans-serif" font-size="8" fill="#888">2 min ago</text>
  <text x="50" y="148" font-family="sans-serif" font-size="10" fill="#333">Just deployed my first app with bld402!</text>
  <text x="50" y="162" font-family="sans-serif" font-size="8" fill="#888">3 likes</text>
  <!-- Post 2 -->
  <rect x="16" y="178" width="368" height="56" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="34" cy="194" r="10" fill="#c8e6c9"/>
  <text x="50" y="196" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1a1a1a">Bob</text>
  <text x="74" y="196" font-family="sans-serif" font-size="8" fill="#888">15 min ago</text>
  <rect x="280" y="182" width="96" height="48" rx="4" fill="#e0e7ef"/>
  <text x="50" y="214" font-family="sans-serif" font-size="10" fill="#333">Check out this sunset photo</text>
  <text x="50" y="226" font-family="sans-serif" font-size="8" fill="#888">7 likes</text>
</svg>
