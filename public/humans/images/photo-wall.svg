  <text x="62" y="116" font-family="sans-serif" font-size="20" fill="#fff" text-anchor="middle" opacity="0.6">&#9744;</text>
  <text x="186" y="116" font-family="sans-serif" font-size="20" fill="#fff" text-anchor="middle" opacity="0.6">&#9744;</text>
  <text x="314" y="116" font-family="sans-serif" font-size="20" fill="#fff" text-anchor="middle" opacity="0.6">&#9744;</text>
