<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Browser chrome -->
  <rect width="400" height="260" rx="8" fill="#f8f9fa" stroke="#e0e0e0"/>
  <rect width="400" height="28" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="48" cy="14" r="5" fill="#28c840"/>
  <!-- Header -->
  <rect y="28" width="400" height="30" fill="#fff"/>
  <text x="200" y="48" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Hangman</text>
  <!-- Gallows and figure -->
  <line x1="60" y1="200" x2="140" y2="200" stroke="#333" stroke-width="3"/>
  <line x1="100" y1="200" x2="100" y2="80" stroke="#333" stroke-width="3"/>
  <line x1="100" y1="80" x2="150" y2="80" stroke="#333" stroke-width="3"/>
  <line x1="150" y1="80" x2="150" y2="100" stroke="#333" stroke-width="2"/>
  <!-- Head -->
  <circle cx="150" cy="112" r="12" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Body -->
  <line x1="150" y1="124" x2="150" y2="160" stroke="#333" stroke-width="2"/>
  <!-- Arms -->
  <line x1="150" y1="135" x2="130" y2="150" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="135" x2="170" y2="150" stroke="#333" stroke-width="2"/>
  <!-- Word display -->
  <text x="260" y="110" font-family="monospace" font-size="22" fill="#1a1a1a" text-anchor="middle" letter-spacing="8">E _ E _ _ A N T</text>
  <!-- Category -->
  <text x="260" y="130" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">Category: Animals</text>
  <!-- Letter buttons row 1 -->
  <g transform="translate(200, 155)">
    <rect x="0" y="0" width="22" height="22" rx="3" fill="#e0e0e0"/><text x="11" y="15" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">A</text>
    <rect x="26" y="0" width="22" height="22" rx="3" fill="#e0e0e0"/><text x="37" y="15" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">B</text>
    <rect x="52" y="0" width="22" height="22" rx="3" fill="#e0e0e0"/><text x="63" y="15" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">C</text>
    <rect x="78" y="0" width="22" height="22" rx="3" fill="#e0e0e0"/><text x="89" y="15" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">D</text>
    <rect x="104" y="0" width="22" height="22" rx="3" fill="#0066cc"/><text x="115" y="15" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">E</text>
  </g>
  <!-- Guesses remaining -->
  <text x="260" y="210" font-family="sans-serif" font-size="10" fill="#dc3545" text-anchor="middle">2 guesses remaining</text>
</svg>
