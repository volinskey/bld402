<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Browser chrome -->
  <rect width="400" height="260" rx="8" fill="#f8f9fa" stroke="#e0e0e0"/>
  <rect width="400" height="28" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="48" cy="14" r="5" fill="#28c840"/>
  <!-- Gradient hero -->
  <defs>
    <linearGradient id="hero-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect y="28" width="400" height="140" fill="url(#hero-grad)"/>
  <text x="200" y="72" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Launch Your Product</text>
  <text x="200" y="95" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.85)" text-anchor="middle">The fastest way to validate your idea.</text>
  <!-- Email signup -->
  <rect x="90" y="115" width="160" height="28" rx="4" fill="rgba(255,255,255,0.95)"/>
  <text x="100" y="133" font-family="sans-serif" font-size="10" fill="#999">your@email.com</text>
  <rect x="254" y="115" width="60" height="28" rx="4" fill="#fff"/>
  <text x="262" y="133" font-family="sans-serif" font-size="10" font-weight="bold" fill="#667eea">Join</text>
  <!-- Features section -->
  <text x="200" y="190" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Features</text>
  <rect x="16" y="200" width="115" height="44" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <text x="24" y="218" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333">Fast Setup</text>
  <text x="24" y="232" font-family="sans-serif" font-size="8" fill="#888">Launch in minutes</text>
  <rect x="140" y="200" width="115" height="44" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <text x="148" y="218" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333">Mobile Ready</text>
  <text x="148" y="232" font-family="sans-serif" font-size="8" fill="#888">Works everywhere</text>
  <rect x="264" y="200" width="115" height="44" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <text x="272" y="218" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333">Customizable</text>
  <text x="272" y="232" font-family="sans-serif" font-size="8" fill="#888">Make it yours</text>
</svg>
