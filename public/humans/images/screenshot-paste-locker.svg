<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Browser chrome -->
  <rect width="400" height="260" rx="8" fill="#f8f9fa" stroke="#e0e0e0"/>
  <rect width="400" height="28" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="48" cy="14" r="5" fill="#28c840"/>
  <!-- Header -->
  <rect y="28" width="400" height="30" fill="#fff"/>
  <text x="16" y="48" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Paste Locker</text>
  <rect x="310" y="36" width="36" height="16" rx="3" fill="#0066cc"/>
  <text x="328" y="48" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">Create</text>
  <rect x="352" y="36" width="36" height="16" rx="3" fill="#fff" stroke="#d0dbe5"/>
  <text x="370" y="48" font-family="sans-serif" font-size="8" fill="#333" text-anchor="middle">Read</text>
  <!-- Title field -->
  <text x="24" y="80" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">Title (optional)</text>
  <rect x="24" y="85" width="352" height="24" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="32" y="101" font-family="sans-serif" font-size="9" fill="#aaa">Give your note a title</text>
  <!-- Content field -->
  <text x="24" y="124" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">Content</text>
  <rect x="24" y="129" width="352" height="44" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="32" y="148" font-family="sans-serif" font-size="9" fill="#aaa">Paste your text here...</text>
  <!-- Password + Expires row -->
  <text x="24" y="190" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">Password</text>
  <rect x="24" y="195" width="168" height="22" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="210" y="190" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">Expires in</text>
  <rect x="210" y="195" width="166" height="22" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="220" y="210" font-family="sans-serif" font-size="9" fill="#333">Never</text>
  <!-- Burn checkbox -->
  <rect x="24" y="226" width="12" height="12" rx="2" fill="#fff" stroke="#ccc"/>
  <text x="42" y="236" font-family="sans-serif" font-size="9" fill="#333">Burn after reading</text>
  <!-- Create button -->
  <rect x="24" y="245" width="352" height="10" rx="4" fill="#0066cc"/>
</svg>
