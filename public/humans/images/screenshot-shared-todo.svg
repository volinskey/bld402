<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Browser chrome -->
  <rect width="400" height="260" rx="8" fill="#f8f9fa" stroke="#e0e0e0"/>
  <rect width="400" height="28" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="48" cy="14" r="5" fill="#28c840"/>
  <!-- Header -->
  <rect y="28" width="400" height="30" fill="#fff"/>
  <text x="16" y="48" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">My Todo List</text>
  <text x="340" y="48" font-family="sans-serif" font-size="10" fill="#888">3 remaining</text>
  <!-- Add form -->
  <rect x="16" y="68" width="300" height="26" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="24" y="85" font-family="sans-serif" font-size="10" fill="#999">Add a task...</text>
  <rect x="324" y="68" width="60" height="26" rx="4" fill="#0066cc"/>
  <text x="342" y="85" font-family="sans-serif" font-size="10" fill="#fff">Add</text>
  <!-- Filter buttons -->
  <rect x="16" y="104" width="36" height="20" rx="10" fill="#0066cc"/>
  <text x="24" y="117" font-family="sans-serif" font-size="9" fill="#fff">All</text>
  <rect x="58" y="104" width="44" height="20" rx="10" fill="#fff" stroke="#ccc"/>
  <text x="64" y="117" font-family="sans-serif" font-size="9" fill="#333">Active</text>
  <rect x="108" y="104" width="40" height="20" rx="10" fill="#fff" stroke="#ccc"/>
  <text x="115" y="117" font-family="sans-serif" font-size="9" fill="#333">Done</text>
  <!-- Todo items -->
  <rect x="16" y="132" width="368" height="32" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <rect x="24" y="141" width="14" height="14" rx="2" fill="#fff" stroke="#ccc"/>
  <text x="44" y="153" font-family="sans-serif" font-size="11" fill="#1a1a1a">Buy groceries</text>
  <rect x="16" y="170" width="368" height="32" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <rect x="24" y="179" width="14" height="14" rx="2" fill="#fff" stroke="#ccc"/>
  <text x="44" y="191" font-family="sans-serif" font-size="11" fill="#1a1a1a">Review project plan</text>
  <rect x="292" y="176" width="52" height="18" rx="9" fill="#f0f0f0"/>
  <text x="300" y="189" font-family="sans-serif" font-size="8" fill="#888">@Alice</text>
  <rect x="16" y="208" width="368" height="32" rx="6" fill="#fff" stroke="#e0e0e0" opacity="0.5"/>
  <rect x="24" y="217" width="14" height="14" rx="2" fill="#0066cc" stroke="#0066cc"/>
  <text x="44" y="229" font-family="sans-serif" font-size="11" fill="#888" text-decoration="line-through">Set up database</text>
</svg>
