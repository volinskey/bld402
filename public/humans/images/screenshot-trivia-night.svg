<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Browser chrome -->
  <rect width="400" height="260" rx="8" fill="#f8f9fa" stroke="#e0e0e0"/>
  <rect width="400" height="28" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="48" cy="14" r="5" fill="#28c840"/>
  <!-- Purple header -->
  <rect y="28" width="400" height="32" fill="#5b21b6"/>
  <text x="200" y="49" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Trivia Night</text>
  <!-- Room info -->
  <text x="16" y="47" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Room: XKCD42</text>
  <text x="384" y="47" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="end">Q 3/10</text>
  <!-- Timer -->
  <circle cx="200" cy="85" r="16" fill="none" stroke="#5b21b6" stroke-width="3"/>
  <text x="200" y="90" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5b21b6" text-anchor="middle">12</text>
  <!-- Question -->
  <text x="200" y="118" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a" text-anchor="middle">What is the largest planet in our solar system?</text>
  <!-- Answer options -->
  <rect x="24" y="132" width="170" height="32" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <text x="36" y="152" font-family="sans-serif" font-size="11" fill="#333">A. Saturn</text>
  <rect x="206" y="132" width="170" height="32" rx="6" fill="#5b21b6"/>
  <text x="218" y="152" font-family="sans-serif" font-size="11" fill="#fff">B. Jupiter</text>
  <rect x="24" y="170" width="170" height="32" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <text x="36" y="190" font-family="sans-serif" font-size="11" fill="#333">C. Neptune</text>
  <rect x="206" y="170" width="170" height="32" rx="6" fill="#fff" stroke="#e0e0e0"/>
  <text x="218" y="190" font-family="sans-serif" font-size="11" fill="#333">D. Mars</text>
  <!-- Scoreboard -->
  <text x="200" y="220" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333" text-anchor="middle">Leaderboard</text>
  <text x="120" y="238" font-family="sans-serif" font-size="9" fill="#5b21b6">1. Alice: 200</text>
  <text x="210" y="238" font-family="sans-serif" font-size="9" fill="#888">2. Bob: 150</text>
  <text x="290" y="238" font-family="sans-serif" font-size="9" fill="#888">3. Carol: 100</text>
</svg>
