<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Browser chrome -->
  <rect width="400" height="260" rx="8" fill="#f8f9fa" stroke="#e0e0e0"/>
  <rect width="400" height="28" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="48" cy="14" r="5" fill="#28c840"/>
  <!-- Header -->
  <rect y="28" width="400" height="30" fill="#fff"/>
  <text x="16" y="48" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Voting Booth</text>
  <!-- Poll title -->
  <text x="200" y="82" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Where should we go for lunch?</text>
  <text x="200" y="98" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">12 votes cast</text>
  <!-- Bar chart results -->
  <text x="24" y="126" font-family="sans-serif" font-size="10" fill="#333">Pizza Place</text>
  <rect x="120" y="115" width="200" height="18" rx="3" fill="#0066cc"/>
  <text x="326" y="128" font-family="sans-serif" font-size="10" fill="#888">8 (67%)</text>
  <text x="24" y="156" font-family="sans-serif" font-size="10" fill="#333">Sushi Bar</text>
  <rect x="120" y="145" width="75" height="18" rx="3" fill="#0066cc" opacity="0.7"/>
  <text x="201" y="158" font-family="sans-serif" font-size="10" fill="#888">3 (25%)</text>
  <text x="24" y="186" font-family="sans-serif" font-size="10" fill="#333">Taco Truck</text>
  <rect x="120" y="175" width="25" height="18" rx="3" fill="#0066cc" opacity="0.5"/>
  <text x="151" y="188" font-family="sans-serif" font-size="10" fill="#888">1 (8%)</text>
  <!-- Share link -->
  <rect x="100" y="210" width="200" height="30" rx="6" fill="#0066cc"/>
  <text x="200" y="229" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">Share This Poll</text>
</svg>
