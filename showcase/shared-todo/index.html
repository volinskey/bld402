<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Todo List — bld402 Demo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23FFF' stroke='%23E5E7EB'/%3E%3Ctext x='2' y='23' font-family='monospace' font-size='20' font-weight='bold' fill='%230066cc'%3E%3E%3C/text%3E%3Cg transform='translate(16,6) rotate(35,8,10)'%3E%3Crect x='7' y='10' width='3' height='14' rx='1' fill='%23374151'/%3E%3Crect x='2' y='5' width='13' height='7' rx='2' fill='%230066cc'/%3E%3C/g%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; line-height: 1.5; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a1a;
      background: #f8f9fa;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; }
    .count { color: #888; font-size: 0.9rem; }
    main {
      max-width: 36rem;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      flex: 1;
      overflow: auto;
      width: 100%;
    }
    .nickname-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .nickname-bar label {
      font-size: 0.85rem;
      color: #666;
      white-space: nowrap;
    }
    .nickname-bar input {
      width: 10rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .nickname-bar input:focus {
      outline: none;
      border-color: #0066cc;
    }
    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .add-form input {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    .add-form input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.15);
    }
    .add-form button {
      padding: 0.6rem 1.25rem;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    .add-form button:hover { background: #0055aa; }
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .filters button {
      padding: 0.35rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 16px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .filters button.active {
      background: #0066cc;
      color: #fff;
      border-color: #0066cc;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      transition: opacity 0.3s;
    }
    .todo-item.done { opacity: 0.5; }
    .todo-item.done .task-text { text-decoration: line-through; }
    .todo-item input[type="checkbox"] {
      width: 1.25rem;
      height: 1.25rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-text { flex: 1; }
    .meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .assigned {
      font-size: 0.8rem;
      color: #888;
      background: #f0f0f0;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
    }
    .seed-badge {
      font-size: 0.7rem;
      color: #0066cc;
      background: #E8F0FE;
      padding: 0.15rem 0.4rem;
      border-radius: 12px;
    }
    .time-left {
      font-size: 0.7rem;
      color: #999;
      white-space: nowrap;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #dc3545;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.25rem;
      opacity: 0.5;
      flex-shrink: 0;
    }
    .delete-btn:hover { opacity: 1; }
    .empty {
      text-align: center;
      padding: 3rem;
      color: #888;
    }
    .loading { text-align: center; padding: 2rem; color: #888; }
    footer {
      text-align: center;
      padding: 0.35rem;
      font-size: 0.75rem;
      color: #888;
      flex-shrink: 0;
    }
    footer a { color: #0066cc; text-decoration: none; }
    @media (max-width: 600px) {
      main { padding: 1rem 0.75rem; }
      .add-form { flex-direction: column; }
      .add-form button { padding: 0.75rem; }
    }
  </style>
</head>
<body>
  <div style="background:#fff3cd; color:#856404; text-align:center; padding:0.5rem; font-size:0.85rem;">
    This is a live demo — try adding tasks! User-added tasks fade after 1 hour.
  </div>
  <header>
    <h1>Shared Todo List</h1>
    <span class="count" id="count"></span>
  </header>

  <main>
    <div class="nickname-bar" id="nickname-bar">
      <label for="nickname-input">Your name:</label>
      <input type="text" id="nickname-input" placeholder="e.g. Alex" maxlength="30">
    </div>

    <form class="add-form" id="add-form">
      <input type="text" id="task-input" placeholder="Add a task..." maxlength="200" required>
      <button type="submit">Add</button>
    </form>

    <div class="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="done">Done</button>
    </div>

    <div id="loading" class="loading">Loading tasks...</div>
    <div id="todo-list"></div>
    <div id="empty" class="empty" style="display:none">No tasks yet. Add one above!</div>
  </main>

  <footer>
    Built with <a href="https://bld402.com">bld402</a> &middot; Powered by <a href="https://run402.com">run402</a>
  </footer>

  <script>
    const CONFIG = {
      API_URL: 'https://api.run402.com',
      ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsInByb2plY3RfaWQiOiJwcmpfMTc3MjcwMjY2NzYwMF8wMDExIiwiaXNzIjoiYWdlbnRkYiIsImlhdCI6MTc3MjcwMjY2NywiZXhwIjoxNzczMzA3NDY3fQ.keoK_7X9F4G2w5xig9mDHyG4R5cF94n8o_ZPjdTNgO0',
      POLL_INTERVAL: 5000,
      TASK_LIFETIME_MS: 60 * 60 * 1000 // 1 hour
    };

    let todos = [];
    let filter = 'all';

    // Nickname persistence
    const nicknameInput = document.getElementById('nickname-input');
    nicknameInput.value = localStorage.getItem('bld402_todo_nickname') || '';
    nicknameInput.addEventListener('input', () => {
      localStorage.setItem('bld402_todo_nickname', nicknameInput.value.trim());
    });

    async function api(path, options = {}) {
      const res = await fetch(CONFIG.API_URL + path, {
        ...options,
        headers: {
          'apikey': CONFIG.ANON_KEY,
          'Content-Type': 'application/json',
          ...options.headers
        }
      });
      if (!res.ok) throw new Error(await res.text());
      if (res.status === 204) return null;
      return res.json();
    }

    async function loadTodos() {
      try {
        todos = await api('/rest/v1/todos?order=created_at.desc');
        render();
      } catch (err) {
        console.error('Failed to load todos:', err);
      }
      document.getElementById('loading').style.display = 'none';
    }

    function timeRemaining(createdAt) {
      const elapsed = Date.now() - new Date(createdAt).getTime();
      const remaining = CONFIG.TASK_LIFETIME_MS - elapsed;
      if (remaining <= 0) return 'expiring...';
      const mins = Math.floor(remaining / 60000);
      if (mins >= 60) return Math.floor(mins / 60) + 'h left';
      return mins + 'm left';
    }

    function fadeOpacity(createdAt) {
      const elapsed = Date.now() - new Date(createdAt).getTime();
      const ratio = elapsed / CONFIG.TASK_LIFETIME_MS;
      // Fade from 1.0 to 0.4 over the lifetime
      return Math.max(0.4, 1 - ratio * 0.6);
    }

    function render() {
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      const list = document.getElementById('todo-list');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      const active = todos.filter(t => !t.done).length;
      count.textContent = active + ' remaining';

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = '';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = filtered.map(t => {
        const isSeed = t.is_seed;
        const opacity = isSeed || t.done ? '' : `style="opacity:${fadeOpacity(t.created_at)}"`;
        const doneClass = t.done ? ' done' : '';
        const timeTag = !isSeed ? `<span class="time-left">${timeRemaining(t.created_at)}</span>` : '';
        const seedTag = isSeed ? '<span class="seed-badge">demo</span>' : '';
        const assignedTag = t.assigned_to ? `<span class="assigned">${escapeHtml(t.assigned_to)}</span>` : '';
        const deleteBtn = !isSeed ? `<button class="delete-btn" onclick="deleteTodo('${t.id}')" title="Delete">&times;</button>` : '';

        return `
          <div class="todo-item${doneClass}" ${opacity}>
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo('${t.id}', ${!t.done})">
            <span class="task-text">${escapeHtml(t.task)}</span>
            <div class="meta">
              ${assignedTag}
              ${seedTag}
              ${timeTag}
            </div>
            ${deleteBtn}
          </div>`;
      }).join('');
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('task-input');
      const task = input.value.trim();
      if (!task) return;

      const nickname = nicknameInput.value.trim() || null;
      try {
        const rows = await api('/rest/v1/todos', {
          method: 'POST',
          headers: { 'Prefer': 'return=representation' },
          body: JSON.stringify({ task, assigned_to: nickname })
        });
        todos.unshift(rows[0]);
        input.value = '';
        render();
      } catch (err) {
        console.error('Failed to add task:', err);
      }
    });

    async function toggleTodo(id, done) {
      try {
        await api('/rest/v1/todos?id=eq.' + id, {
          method: 'PATCH',
          body: JSON.stringify({ done })
        });
        const todo = todos.find(t => t.id === id);
        if (todo) todo.done = done;
        render();
      } catch (err) {
        console.error('Failed to toggle task:', err);
      }
    }

    async function deleteTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo && todo.is_seed) return; // protect seed tasks client-side too
      try {
        await api('/rest/v1/todos?id=eq.' + id, { method: 'DELETE' });
        todos = todos.filter(t => t.id !== id);
        render();
      } catch (err) {
        console.error('Failed to delete task:', err);
      }
    }

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.filters .active').classList.remove('active');
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    // Initial load
    loadTodos();

    // Poll every 5 seconds for updates from other users
    setInterval(loadTodos, CONFIG.POLL_INTERVAL);

    // Re-render every 30 seconds to update fade and time-remaining
    setInterval(render, 30000);
  </script>
</body>
</html>
